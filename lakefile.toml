name = "HilleYosida"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["HilleYosida"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

# BochnerMinlos require dropped for the Tau Ceti port: the Mathlib-only slice
# (StronglyContinuousSemigroup, Bernstein chain) does not depend on it; only the
# BCR existence files (BCR_Common, BCR_Existence) did.

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "HilleYosida"
