  reviewers: []
  notes: >
    0 sorries and 0 axioms across the active build (main, HEAD 0c3692e); verified
    by grep. docs/status.md still lists two axioms in Future/GenerationTheorem.lean,
    but those declarations are currently commented out, so the repo has no genuine
    axioms. Builds on Lean/Mathlib v4.29.0-rc6.

